[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short

[flake8]
max-line-length = 120
max-complexity = 10
exclude =
    .git,
    __pycache__,
    venv,
    .venv,
    build,
    dist,
    .eggs,
    *.egg-info,
    .pytest_cache,
    .coverage,
    htmlcov
ignore =
    E203,
    W503,
    W504
per-file-ignores =
    __init__.py:F401
    tests/*:F841

[isort]
profile = black
line_length = 120
skip_gitignore = true
multi_line_mode = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip = venv,.venv,build,dist,.eggs,*.egg-info


[pylint]
max-line-length = 120
disable =
    missing-docstring,
    too-few-public-methods,
    C0111
