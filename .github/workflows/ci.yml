name: 🚀 CI/CD Pipeline - Olist Segmentation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: olist-segmentation

jobs:
  # ============================================================================
  # 1. CODE QUALITY CHECKS
  # ============================================================================
  code-quality:
    name: 🔍 Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install flake8 black isort pylint
    
    - name: 🎨 Format check with Black
      run: black --check --diff src tests
      continue-on-error: true

    - name: 📋 Check import sorting with isort
      run: isort --check-only --diff src tests
      continue-on-error: true

    - name: 🧹 Lint with flake8 (critical errors only)
      run: |
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: 🧹 Lint with flake8 (full — informational)
      run: |
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      continue-on-error: true

    - name: 🔎 Lint with pylint
      run: pylint src/ --fail-under=8.0 --exit-zero
      continue-on-error: true

  # ============================================================================
  # 2. UNIT TESTS WITH COVERAGE
  # ============================================================================
  test:
    name: 🧪 Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist pytest-mock
    
    - name: 🧪 Run tests with pytest
      run: |
        pytest tests/ \
          --verbose \
          --cov=src \
          --cov-report=xml \
          --cov-report=html:htmlcov \
          --cov-report=term-missing:skip-covered \
          --cov-fail-under=80 \
          --junitxml=pytest.xml \
          -n auto
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || 'sqlite:///mlflow_ci.db' }}
    
    - name: 📊 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-py${{ matrix.python-version }}
        fail_ci_if_error: true
        verbose: true
    
    - name: 📈 Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: pytest-results-${{ matrix.python-version }}
        path: |
          pytest.xml
          htmlcov/
    
    - name: 📝 Comment PR with coverage
      if: github.event_name == 'pull_request' && always()
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 85
        MINIMUM_ORANGE: 70

  # ============================================================================
  # 3. MLFLOW TRACKING SERVER — vérifie le serveur et publie l'UI
  # ============================================================================
  mlflow-tracking:
    name: 📊 MLflow Tracking Server
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow>=2.10.0

    - name: 🚀 Start MLflow server
      run: |
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri sqlite:///mlruns.db \
          --default-artifact-root ./mlartifacts &
        # Wait for server to be ready
        for i in $(seq 1 15); do
          curl -sf http://localhost:5000/health && break || sleep 2
        done

    - name: 🧪 Verify MLflow server health
      run: |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
        echo "MLflow server status: $STATUS"
        [ "$STATUS" = "200" ] && echo "✅ MLflow server is up" || (echo "❌ MLflow server failed" && exit 1)

    - name: 📈 Run a tracking smoke test
      run: |
        python - <<'EOF'
        import mlflow
        mlflow.set_tracking_uri("http://localhost:5000")
        mlflow.set_experiment("ci_smoke_test")
        with mlflow.start_run(run_name="ci_check"):
            mlflow.log_param("env", "github_actions")
            mlflow.log_metric("smoke_test_passed", 1.0)
        print("✅ MLflow tracking smoke test passed")
        EOF

    - name: 📦 Upload MLflow artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: mlflow-tracking-store
        path: |
          mlruns.db
          mlartifacts/
        retention-days: 14

  # ============================================================================
  # 4. BUILD AND PUSH DOCKER IMAGE
  # ============================================================================
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [code-quality, test]
    permissions:
      contents: read
      packages: write
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4
    
    - name: 🔑 Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: 🔑 Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: 🐳 Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ============================================================================
  # 5. SECURITY SCANNING
  # ============================================================================
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 📦 Install security tools
      run: |
        pip install bandit safety
    
    - name: 🔍 Security check with Bandit
      run: |
        bandit -r src/ -v --exit-code 0
      continue-on-error: true
    
    - name: 🛡️ Check dependencies with Safety
      run: |
        safety check --json
      continue-on-error: true

  # ============================================================================
  # 6. DEPLOYMENT STATUS
  # ============================================================================
  status:
    name: ✅ Pipeline Status
    runs-on: ubuntu-latest
    needs: [code-quality, test, mlflow-tracking, docker-build, security]
    if: always()
    
    steps:
    - name: 🎉 Pipeline Success
      if: needs.code-quality.result == 'success' && needs.test.result == 'success'
      run: |
        echo "✅ All checks passed!"
        echo "🐳 Docker image ready for deployment"
        echo "📊 Coverage reports available"
    
    - name: ⚠️ Pipeline Failed
      if: failure()
      run: |
        echo "❌ Pipeline failed"
        exit 1
